<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TED Verify MVP</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Poppins; padding: 20px; max-width: 600px; margin: auto; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; }
    .box { border: 1px solid #ddd; padding: 15px; margin-top: 20px; }
    .valid { color: green; }
    .invalid { color: red; }
  </style>
</head>
<body>

<h2>Issue Credential</h2>
<div class="box">
  <input id="name" placeholder="Student Name"/>
  <input id="matric" placeholder="Matric Number"/>
  <input id="program" placeholder="Program"/>
  <input id="inst" placeholder="Institution Code (e.g UNILAG)"/>
  <button onclick="issueCredential()">Issue</button>
  <p id="issueResult"></p>
</div>

<h2>Verify Credential</h2>
<div class="box">
  <input id="verifyId" placeholder="Enter Certificate ID"/>
  <button onclick="verifyCredential()">Verify</button>
  <div id="verifyResult"></div>
</div>

<script>
  // 🔑 REPLACE THESE
  const SUPABASE_URL = "https://bmzgcwfliefpwlxkzhrf.supabase.co";
  const SUPABASE_KEY = "sb_publishable_VcWy7uF7iW_-oy_wCns2nQ_oGUqQOBI";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Generate ID
  function generateId(inst) {
    const rand = Math.random().toString(36).substring(2, 8).toUpperCase();
    return `TED-${inst}-${rand}`;
  }

  async function issueCredential() {
  try {
    const name = document.getElementById("name").value;
    const matric = document.getElementById("matric").value;
    const program = document.getElementById("program").value;
    const inst = document.getElementById("inst").value.toUpperCase();

    console.log("INPUT:", { name, matric, program, inst });

    if (!name || !matric || !program || !inst) {
      alert("Fill all fields");
      return;
    }

    const id = "TEST-" + Math.random().toString(36).substring(2, 8).toUpperCase();

    const { data, error } = await sb
      .from("credentials")
      .insert([{
        certificate_id: id,
        student_name: name,
        matric: matric,
        program: program,
        inst_code: inst
      }])
      .select();

    console.log("RESPONSE DATA:", data);
    console.log("RESPONSE ERROR:", error);

    if (error) {
      alert("Insert failed: " + error.message);
      return;
    }

    alert("Issued successfully: " + id);

  } catch (err) {
    console.error("FATAL ERROR:", err);
  }
}

  async function verifyCredential() {
    const id = document.getElementById("verifyId").value.trim().toUpperCase();

    const { data, error } = await sb
      .from("credentials")
      .select("*")
      .eq("certificate_id", id)
      .maybeSingle();

    const box = document.getElementById("verifyResult");

    if (error || !data) {
      box.innerHTML = `<p class="invalid">INVALID CERTIFICATE</p>`;
      return;
    }

    box.innerHTML = `
      <p class="valid">VALID CERTIFICATE</p>
      <p>Name: ${data.student_name}</p>
      <p>Program: ${data.program}</p>
      <p>Institution: ${data.inst_code}</p>
    `;
  }
</script>

</body>
</html>
